  <script>
    tailwind.config = {

            'border-subtle': 'rgba(255,255,255,0.06)', 'border-hover': 'rgba(138,43,226,0.4)',
          },

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    @font-face {
      font-family: 'Alibaba PuHuiTi';
      src: url('https://puhuiti.oss-cn-hangzhou.aliyuncs.com/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-45-Light/AlibabaPuHuiTi-3-45-Light.woff2') format('woff2');

      font-display: swap;
    }
    @font-face {
      font-family: 'Alibaba PuHuiTi';
      src: url('https://puhuiti.oss-cn-hangzhou.aliyuncs.com/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-55-Regular/AlibabaPuHuiTi-3-55-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Alibaba PuHuiTi';
      src: url('https://puhuiti.oss-cn-hangzhou.aliyuncs.com/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-65-Medium/AlibabaPuHuiTi-3-65-Medium.woff2') format('woff2');
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: 'Alibaba PuHuiTi';
      src: url('https://puhuiti.oss-cn-hangzhou.aliyuncs.com/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-75-SemiBold/AlibabaPuHuiTi-3-75-SemiBold.woff2') format('woff2');
      font-weight: 600;
      font-display: swap;
    }
    @font-face {
      font-family: 'Alibaba PuHuiTi';
      src: url('https://puhuiti.oss-cn-hangzhou.aliyuncs.com/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-85-Bold/AlibabaPuHuiTi-3-85-Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0A0A0A; color:#EDEDED; font-family:'Alibaba PuHuiTi','Inter',system-ui,sans-serif; }
    .grid-bg { background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px); background-size:60px 60px; }
    .nav-glass { background:rgba(10,10,10,.7); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,.04); }
    .nav-link { color:#A1A1AA; transition:color .3s; } 
    .nav-link:hover { color:#EDEDED; }
    .accent-text { background:linear-gradient(135deg,#8A2BE2,#B026FF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .orb { position:absolute; border-radius:50%; filter:blur(100px); pointer-events:none; opacity:.12; }
    .fade-in { animation:fadeIn .6s ease-out forwards; }
    .fade-in-d1 { animation:fadeIn .6s ease-out .15s forwards; opacity:0; }
    .fade-in-d2 { animation:fadeIn .6s ease-out .3s forwards; opacity:0; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .noise-overlay { position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:.02; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-repeat:repeat; background-size:256px 256px; }
    ::-webkit-scrollbar { width:6px; } 
    ::-webkit-scrollbar-track { background:#0A0A0A; } 
    ::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
    
    /* Masonry Grid - JavaScript 控制的瀑布流布局 */
    .masonry-grid { 
      position: relative;
      width: 100%;
    }
    
    .masonry-item { 
      position: absolute;
      width: calc((100% - 40px) / 3); /* 3列，间距20px */
      transition: top 0.3s ease, left 0.3s ease;
    }
    
    @media (max-width: 1024px) { 
      .masonry-item { 
        width: calc((100% - 20px) / 2); /* 2列 */
      }
    }
    @media (max-width: 640px) { 
      .masonry-item { 
        width: 100%; /* 1列 */
      }
    }
    
    .masonry-item-inner {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }
    .masonry-item img { 
      width: 100%; 
      height: auto;
      display: block; 
      cursor: pointer; 
      transition: none;
    }
    .masonry-item-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      pointer-events: none;
      transition: border-color .3s ease, box-shadow .3s ease;
    }
    .masonry-item:hover .masonry-item-inner::after { 
      border-color: rgba(138,43,226,.5); 
      box-shadow: 0 8px 24px rgba(138,43,226,.15); 
    }
    
    /* Image Modal */
    .image-modal { 
      display:none; 
      position:fixed; 
      inset:0; 
      background:rgba(0,0,0,0.95); 
      z-index:9999; 
      cursor:zoom-out; 
    }
    .image-modal.active { 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      animation:fadeIn 0.3s; 
    }
    .image-modal img { 
      max-width:90%; 
      max-height:90vh; 
      object-fit:contain; 
    }
  </style>
</head>
<body class="grid-bg">
  <div class="noise-overlay"></div>
  
  <!-- Image Modal -->
  <div class="image-modal" id="imageModal" onclick="closeImageModal()">
    <img src="" alt="" id="modalImage">
  </div>

  <nav class="nav-glass fixed top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto px-6 lg:px-10 h-16 flex items-center justify-between">
      <a href="index.html" class="font-display font-bold text-lg tracking-tight text-text-primary">Snowxx<span class="accent-text">.</span></a>
      <div class="flex items-center gap-6">
        <a href="index.html" class="nav-link font-body text-sm">Home</a>
        <a href="index.html#works" class="nav-link font-body text-sm">Works</a>
        <a href="index.html#contact" class="nav-link font-body text-sm">Contact</a>
      </div>
    </div>
  </nav>

  <section class="relative pt-28 pb-16 overflow-hidden">
    <div class="orb w-[400px] h-[400px] bg-accent -top-32 -right-32" style="position:absolute;"></div>
    <div class="max-w-7xl mx-auto px-6 lg:px-10">
      <div class="fade-in">
        <a href="index.html#works" onclick="localStorage.setItem('activeTab','ppt')" class="inline-flex items-center gap-2 text-text-muted text-sm font-mono hover:text-accent transition-colors mb-8 group">
          <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/></svg>
          返回作品列表
        </a>
      </div>
      <div class="fade-in-d1">
        <p class="font-mono text-xs text-accent tracking-[0.3em] uppercase mb-3">PPT 设计</p>
        <h1 class="font-display font-bold text-4xl md:text-5xl lg:text-6xl tracking-tight mb-4">演示设计与重构</h1>
        <p class="text-text-secondary text-lg md:text-xl max-w-2xl">多行业的信息可视化编排</p>

  </section>

  <main class="max-w-7xl mx-auto px-6 lg:px-10 pb-24">
    <div class="masonry-grid fade-in-d2">
      <div class="masonry-item">
        <div class="masonry-item-inner">
          <img src="09-1.webp" alt="医疗行业 PPT 美化 — Edwards Lifesciences" onclick="openImageModal('09-1.webp')">

      </div>
      <div class="masonry-item">
        <div class="masonry-item-inner">
          <img src="09-2.webp" alt="职业教育课件 PPT 美化" onclick="openImageModal('09-2.webp')">
        </div>
      </div>
      <div class="masonry-item">
        <div class="masonry-item-inner">
          <img src="09-3.webp" alt="短视频实训系统产品介绍 PPT 美化" onclick="openImageModal('09-3.webp')">

      </div>
      <div class="masonry-item">
        <div class="masonry-item-inner">

  <footer class="border-t border-border-subtle py-8" style="border-color:rgba(255,255,255,0.06)">

      <p class="text-text-muted text-xs font-mono">© 2026 Snowxx. All rights reserved.</p>
      <p class="text-text-muted text-xs font-mono">Designed with precision<span class="accent-text ml-1">.</span></p>
    </div>
  </footer>
  
  <script>
    // Masonry Layout Function
    function layoutMasonry() {
      const grid = document.querySelector('.masonry-grid');
      const items = document.querySelectorAll('.masonry-item');
      
      if (!grid || items.length === 0) return;
      
      const gap = 20; // 间距
      const cols = window.innerWidth > 1024 ? 3 : (window.innerWidth > 640 ? 2 : 1);
      const itemWidth = (grid.offsetWidth - gap * (cols - 1)) / cols;
      
      // 初始化每列的高度数组
      const columnHeights = new Array(cols).fill(0);
      
      // 定义每列应该包含的图片索引（3/2/2 布局）
      const columnAssignments = [
        [0, 1, 2], // 第1列: 09-1, 09-2, 09-3
        [3, 4],    // 第2列: 09-4, 09-5
        [5, 6]     // 第3列: 09-6, 09-7
      ];
      
      items.forEach((item, index) => {
        // 确定该图片属于哪一列
        let targetCol = 0;
        for (let col = 0; col < columnAssignments.length; col++) {
          if (columnAssignments[col].includes(index)) {
            targetCol = col;
            break;
          }
        }
        
        // 如果超出列数（响应式），使用默认逻辑
        if (targetCol >= cols) {
          targetCol = index % cols;
        }
        
        // 计算位置
        const left = targetCol * (itemWidth + gap);
        const top = columnHeights[targetCol];
        
        // 设置位置
        item.style.width = itemWidth + 'px';
        item.style.left = left + 'px';
        item.style.top = top + 'px';
        
        // 更新列高度（包含图片高度 + 间距）
        const itemHeight = item.offsetHeight;
        columnHeights[targetCol] += itemHeight + gap;
      });
      
      // 设置容器高度
      const maxHeight = Math.max(...columnHeights) - gap; // 减去最后一个gap
      grid.style.height = maxHeight + 'px';
    }
    
    // Image Modal Functions
    function openImageModal(src) {
      const modal = document.getElementById('imageModal');
      const img = document.getElementById('modalImage');
      img.src = src;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function closeImageModal() {
      const modal = document.getElementById('imageModal');
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }
    
    // ESC key to close
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeImageModal();
    });
    
    // 初始化布局
    window.addEventListener('load', () => {
      // 等待所有图片加载完成
      const images = document.querySelectorAll('.masonry-item img');
      let loadedCount = 0;
      
      images.forEach(img => {
        if (img.complete) {
          loadedCount++;
          if (loadedCount === images.length) {
            layoutMasonry();
          }
        } else {
          img.addEventListener('load', () => {
            loadedCount++;
            if (loadedCount === images.length) {
              layoutMasonry();
            }
          });
        }
      });
    });
    
    // 窗口大小改变时重新布局
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(layoutMasonry, 100);
    });
  </script>
</body>
</html>
